name: CD

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, used as git tag and Docker image tag.
        required: true
        type: string
      target_ref:
        description: Git ref to release.
        required: false
        default: main
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: cashregister-api
  FE_IMAGE_NAME: cashregister-fe

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        if: ${{ env.ACT != 'true' }}
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Use local repository under act
        if: ${{ env.ACT == 'true' }}
        run: echo "Using bind-mounted local repository for act."

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: be/global.json

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Restore frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Format backend
        working-directory: be
        run: dotnet format --verify-no-changes

      - name: Build backend
        working-directory: be
        run: dotnet build

      - name: Test backend
        working-directory: be
        run: dotnet test

      - name: Lint frontend
        working-directory: ui
        run: npm run lint

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Test frontend
        working-directory: ui
        run: npm run test

      - name: Set up Docker Buildx
        if: ${{ env.ACT != 'true' }}
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        if: ${{ env.ACT != 'true' }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ env.ACT != 'true' }}
        id: build-api
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: be.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE_NAME }}:${{ inputs.version }}

      - name: Build and push frontend image
        if: ${{ env.ACT != 'true' }}
        id: build-fe
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ui.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            API_BASE_URL=/api
            LOW_QUANTITY_WARNING_THRESHOLD=5
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.FE_IMAGE_NAME }}:${{ inputs.version }}

      - name: Create git tag and draft release
        if: ${{ env.ACT != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          scripts/create-draft-release.sh
          "${{ inputs.version }}"
          "${{ inputs.target_ref }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE_NAME }}:${{ inputs.version }}"
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.FE_IMAGE_NAME }}:${{ inputs.version }}"
          "${{ steps.build-api.outputs.digest }}"
          "${{ steps.build-fe.outputs.digest }}"

      - name: Report local act dry run
        if: ${{ env.ACT == 'true' }}
        run: echo "Skipping GHCR push, git tag creation, and GitHub release creation under act."
