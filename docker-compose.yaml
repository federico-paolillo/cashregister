services:
  gateway:
    image: caddy:2.11.2
    depends_on:
      - api
      - ui
    ports:
      - "65000:65000"
    volumes:
      - ./rp.Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - cashregister
    restart: always

  api:
    build:
      context: .
      dockerfile: be.Dockerfile
    image: cashregister-api:local
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:65000
      DOTNET_URLS: http://0.0.0.0:65000
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_ENVIRONMENT: Production
      CASHREGISTER_DATASOURCE: /var/lib/cashregister/cashregister.db
    expose:
      - "65000"
    volumes:
      - /home/federico/cashregister:/var/lib/cashregister
    networks:
      - cashregister
    restart: always

  ui:
    build:
      context: .
      dockerfile: ui.Dockerfile
      args:
        API_BASE_URL: /api
        VITE_LOW_QUANTITY_WARNING_THRESHOLD: 5
    image: cashregister-ui:local
    expose:
      - "65000"
    networks:
      - cashregister
    restart: always

networks:
  cashregister:
